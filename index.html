<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Codificación de caracteres (para que se vean bien las tildes y ñ) -->
  <meta charset="UTF-8" />
  <!-- Hace que la página se vea bien en celulares -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- El título que aparece en la pestaña del navegador -->
  <title>Mi Primera Página Web</title>

  <!-- Conectamos nuestro archivo de estilos (CSS) -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Encabezado de la página -->
  <header>
    <h1>¡Hola Mundo! 🌎</h1>
    <p>Esta es nuestra primera página web hecha en clase.</p>
  </header>

  <!-- Contenido principal -->
  <main>
    <section class="tarjeta">
      <h2>¿Qué estamos aprendiendo?</h2>
      <ul>
        <li>Cómo usar Visual Studio Code 💻</li>
        <li>Cómo escribir HTML, CSS y JavaScript</li>
        <li>Cómo subir cambios a GitHub con GitHub Desktop 🚀</li>
      </ul>

      <!-- Este botón ejecuta una función de JavaScript al hacer clic -->
      <button id="boton">¡Hacé clic acá!</button>

      <!-- Acá JavaScript va a mostrar un mensaje -->
      <p id="mensaje"></p>
    </section>
  </main>

  <!-- Pie de página -->
  <footer>
    <p>Hecho con ❤️ en clase</p>
  </footer>

  <!-- Conectamos nuestro archivo de JavaScript -->
  <script src="script.js"></script>
</body>
</html>
