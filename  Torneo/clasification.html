<!DOCTYPE html>

<head>

    <title>Clasificación de Ajedrez - 50 Jugadores</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .tabla-contenedor {
            width: 100%;
            max-width: 950px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: #2c3e50;
            color: #ffffff;
        }

        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid #dddddd;
            font-size: 14px;
        }

        /* Alineación centrada para datos numéricos y posición */
        th:nth-child(1), td:nth-child(1),
        th:nth-child(5), td:nth-child(5),
        th:nth-child(6), td:nth-child(6) {
            text-align: center;
        }

        /* Estilo para filas alternas (cebreado) */
        tbody tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        /* Efecto al pasar el cursor */
        tbody tr:hover {
            background-color: #e9ecef;
        }

        /* Botón de impresión */
        .btn-imprimir {
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-imprimir:hover {
            background-color: #1a252f;
        }

        /* Ocultar botón al imprimir */
        @media print {
            .btn-imprimir {
                display: none;
            }
            body {
                background-color: white;
            }
            .tabla-contenedor {
                box-shadow: none;
            }
        }
    </style>
</head>
